# WireGuard Manager Configuration
# This file is sourced by the management scripts

# Server Configuration
WG_INTERFACE="wg0"
WG_PORT="51820"
WG_SUBNET="10.66.66.0/24"
WG_SERVER_IP="10.66.66.1"
WG_DNS="1.1.1.1, 8.8.8.8"
WG_MTU="1420"

# Network Configuration
SERVER_PUB_IP=""
SERVER_PUB_NIC="eth0"
SERVER_WG_NIC="wg0"

# Paths
WG_CONFIG_DIR="/etc/wireguard"
WG_MANAGER_DIR="/etc/wireguard-manager"
WG_USERS_DIR="${WG_MANAGER_DIR}/users"
WG_BACKUP_DIR="${WG_MANAGER_DIR}/backups"
WG_LOG_DIR="${WG_MANAGER_DIR}/logs"
WG_KEYS_DIR="${WG_MANAGER_DIR}/keys"

# IP Pool Management
IP_POOL_START="10.66.66.2"
IP_POOL_END="10.66.66.254"
USED_IPS_FILE="${WG_MANAGER_DIR}/used_ips.txt"

# User Database
USER_DB="${WG_MANAGER_DIR}/users.db"

# Logging
LOG_FILE="${WG_LOG_DIR}/wg-manager.log"
LOG_LEVEL="INFO"  # DEBUG, INFO, WARN, ERROR

# Telegram Bot Configuration
TELEGRAM_ENABLED="false"
TELEGRAM_BOT_TOKEN=""
TELEGRAM_ALLOWED_USERS=""  # Comma-separated chat IDs
TELEGRAM_POLL_INTERVAL="3"

# Monitoring Configuration
MONITOR_ENABLED="true"
MONITOR_INTERVAL="60"  # seconds
USAGE_LOG_DIR="${WG_MANAGER_DIR}/usage"
ALERT_THRESHOLD_MB="10240"  # Alert when user exceeds this (MB)

# Backup Configuration
BACKUP_ENABLED="true"
BACKUP_SCHEDULE="0 2 * * *"  # Daily at 2 AM
BACKUP_RETAIN_DAYS="30"
BACKUP_COMPRESS="true"

# Server Maintenance
AUTO_REBOOT_ENABLED="false"
AUTO_REBOOT_SCHEDULE="0 4 * * 0"  # Sunday at 4 AM
AUTO_UPDATE_ENABLED="false"

# Firewall
FIREWALL_TYPE="iptables"  # iptables or nftables

# Advanced Settings
ALLOWED_IPS="0.0.0.0/0, ::/0"  # Client allowed IPs
PERSISTENT_KEEPALIVE="25"
SAVE_CONFIG="true"
